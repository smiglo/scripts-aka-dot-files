general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances
    before_sleep_cmd = loginctl lock-session    # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # turn on display after sleep
}

# 1. Dim screen after 2.5 minutes

listener {
    timeout = 150
    on-timeout = brightnessctl -s set 10%
    on-resume = brightnessctl -r
}

# 2. Lock screen after 5 minutes
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# 3. Turn off screen (DPMS) after 5.5 minutes
listener {
    timeout = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# 4. Suspend (Sleep) after 10 minutes
listener {
    timeout = 600
    on-timeout = systemctl suspend
}

listener {
    event = sw_lid_close
    on-match = systemctl suspend
}
