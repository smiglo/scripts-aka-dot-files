# packages # {{{
packages[basic]="tmux cmatrix mc pv htop btop file less rlwrap"
packages[basic]+=" coreutils moreutils ca-certificates psmisc"
packages[curl]="curl wget"
packages[devel]="gcc clang ccache llvm"
