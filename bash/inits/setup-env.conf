  packages[misc]=" cowsay figlet lolcat fortune-mod"
fi # }}}
# }}}
# tools # {{{
tools[dedoc]=
# }}}
case $OS_KIND in
ubuntu) # {{{
  stepsList[ext-fzf-local]=
  binMiscList[up]="up.ubu"
  if is-os-allowed +gui ubuntu; then
    binMiscList[chroma-effects-wrapper.sh]=
  fi
  dotFilesList[radare2rc]=
  if ${SETUP_ENV_AUTOSTART_ENABLED:-false}; then
    for as in dropbox gnome-terminal indicator-multiload keepboard; do
      dotFilesList[autostart/$as.desktop]=".config/autostart/$as.desktop"
    done
    unset as
  fi
  # dotFilesList[dot-files/pulse-audio-default.pa]="conifig/pulse/default.pa"
  packages[basic]+=" build-essential coreutils lsof whiptail"j
  packages[basic]+=" sudo bash-completion locales locate bsdmainutils"
  packages[devel]+=" clang-format"
  packages[devel]+=" gdb-multiarch valgrind strace"
  packages[devel]+=" cmake ninja-build pkg-config"
  packages[devel]+=" libboost-all-dev "
  packages[find-tools]+=" ack silversearcher-ag fd-find bfs"
  packages[man]+=" man manpages-dev manpages-posix-dev"
  packages[net-tools]+=" bind9-dnsutils inetutils-ping iw"
  # packages[rev-eng]+=" frida radare2 rr"
  packages[utils]+=" tcpdump netcat-openbsd sshpass procps ufw fastfetch"
  packages[ssh]+=" ssh openssh-server"
  packages[vim-devel]+=" exuberant-ctags"
  packages[vim]+=" vim.gtk"
  if is-os-allowed -virt-os; then
    packages[devel]+=" minicom"
    packages[git]+=" git-lfs"
    packages[python]+=" python3-pip"
    packages[utils]+=" mailutils cryptsetup"
  fi
  if is-os-allowed +gui; then
    packages[basic]+=" xclip"
    packages[gui]+=" \
      gnuplot-x11 libnotify-bin notify-osd galculator \
      compizconfig-settings-manager unity-tweak-tool gnome-tweak-tool \
      synaptic dconf-cli dconf-editor gparted \
      gucharmap kcharselect xsel software-properties-gtk"
  fi
  tools[gemini]=
  tools[pwndbg]=
  ;; # }}}
arch) # {{{
  unset \
    stepsList[fzf-local] stepsList[ack]
  dotFilesList[arch/chrome.flags]=".config/"
  dotFilesList[arch/fonts.conf]=".config/fontconfig/"
  dotFilesList[arch/hyprland/hypridle.conf]=".config/hypr/"
  dotFilesList[arch/hyprland/hyprland.conf]=".config/hypr/"
  dotFilesList[arch/hyprland/hyprlock.conf]=".config/hypr/"
  dotFilesList[arch/hyprland/hyprpaper.conf]=".config/hypr/"
  dotFilesList[radare2rc]=
  packages[basic]+=" sudo bash-completion locate libnewt fzf alacritty linux-headers libinput libinput-tools"
  packages[devel]+=" base-devel gdb valgrind strace pwndbg"
  packages[devel]+=" cmake ninja pkg-config"
  packages[find-tools]+=" fd the_silver_searcher"
  packages[fonts]+=" \
      ttf-firacode-nerd \
      ttf-cascadia-code-nerd \
      noto-fonts noto-fonts-emoji \
      ttf-font-awesome"

  # packages[fonts]+=" ttf-fira-mono"
  # packages[fonts]+=" ttf-nerd-fonts-symbols"
  packages[man]+=" man"
  packages[net-tools]+=" inetutils iw ethtool bind-tools"
  # packages[rev-eng]+=" frida radare2 rr"
  packages[ssh]+=" openssh"
  packages[vim]+=" gvim"
  packages[vim-devel]+=" ctags"
  packages[utils]+=" up rust procps-ng libcap ufw"
  packages[utils]+=" tcpdump openbsd-netcat fastfetch"
  packages[new-ones]+=" binutils"
  if is-os-allowed -virt-os; then
    packages[devel]+=" minicom"
  fi
  if is-os-allowed +gui; then
    # packages[gui]+=" wireshark-qt"
    packages[wayland]+=" wayland wayland-protocols xorg-xwayland qt5-wayland qt6-wayland glfw-wayland sddm"
    packages[wayland]+=" rofi-wayland wl-clipboard cliphist wl-clip-persist waybar swaync"
    packages[hyprland]+=" hyprland xdg-desktop-portal-hyprland xdg-desktop-portal-gtk hypridle hyprlock"
    packages[hyprland]+=" hyprlauncher hyprpaper hyprshot hyprpolkitagent pavucontrol"
  fi
  tools[gemini]=
  declare -A paruTools=( [google-chrome]= [visual-studio-code-bin]= )
  ;; # }}}
mac) # {{{
  packages[basic]+=" bash binutils bash-completion@2 file-formula whiptail"
  packages[basic]+=" perl python python3"
  packages[basic]+=" tmux-pasteboard fzf"
  packages[devel]+=" autoconf automake cmake m4 make makedepend glib"
  packages[find-tools]+=" ack fd the_silver_searcher tavianator/tap/bfs"
  packages[gnu]+=" gnu-getopt gnu-sed grep findutils gnu-tar gnu-which"
  packages[utils]+=" diffutils mcrypt mhash mtr nethack openssh"
  packages[utils]+=" pidof up gcal watch"
  packages[vim-devel]+=" ctags"
  ;; # }}}
esac
