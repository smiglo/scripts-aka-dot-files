# vim: fdm=marker fdl=0

# Unbindings # {{{
unbind-key -a -T prefix
run-shell "tmux list-keys -T root | grep -v -E 'root (Mouse)|(Wheel)' | sed 's/^.*-T root //' | awk '{print \$1}' | xargs -n 1 tmux unbind -T root"
# }}}
# Configuration # {{{
# Meta-key & send-prefix # {{{
set -qg  prefix2 C-Space
set -qg  prefix  C-q
bind-key C-q     send-prefix
bind-key C-a     send-prefix -2
bind-key -n M-q  send-keys "C-q"
# }}}
# VI mode # {{{
set -qg status-keys vi

# Use vim keybindings in copy mode
set-window-option -qg mode-keys vi
# }}}
# Mouse # {{{
set-window-option -qg mode-mouse on
# }}}
# Windows numbering # {{{
set-window-option -qg automatic-rename on

# Set window and pane index to 1 (0 by default)
set-option -qg base-index 1
set-window-option -qg pane-base-index 1
# }}}
# Titles: autorename terminal title # {{{
set -qg allow-rename on
set -qg set-titles on
run-shell '~/.tmux.bash set_title'
# }}}
# Set word separator (remove '_') # {{{
set -qg word-separator ' -+=`~!@#$%^&*,.[]{}()<>\|;:/?"'"'"
# }}}
# Global # {{{
set-window-option -qg aggressive-resize off
set-window-option -qg window-size latest

set -qg set-clipboard off

set -qg default-terminal "tmux-256color"
set -as terminal-features ",alacritty:RGB"
# set -ag terminal-overrides ",screen-256color:RGB"

set-window-option -qg xterm-keys on

set -qg default-shell "/bin/bash"

set -qg history-limit 20000

set -qs buffer-limit 64

# Shorten command delay
set -qsg escape-time 1

# Set a timeout for repeatable bindings
set -qg repeat-time 300

# Longer message display time
set -qg display-time 2000

# How long panes' IDs are displayed
set -qg display-panes-time 5000

set-option -g update-environment "SSH_CLIENT SSH_CONNECTION SSH_TTY DISPLAY WAYLAND_DISPLAY TMP_PATH_LAST_CHECK"

set -qg lock-server on

set -qg copy-command "cat - | $SCRIPT_PATH/bin/oth/tmux-xclip --put"

# Initialize default
run-shell '~/.tmux.bash defaults'
# }}}
# }}}
# Bindings # {{{
# Global # {{{
bind-key :   command-prompt
bind-key \;  command-prompt
bind-key i   show-messages
bind-key l   lock
bind-key C-o command-prompt -p 'Lock after [s]:' "set -g lock-after-time \"%%\""
bind-key L   run-shell    '~/.tmux.bash lock_toggle -q --ssh'
bind-key V   run-shell -b '~/.tmux.bash pasteKey'
bind-key n   run-shell -b 'note --tmux #D:#S:#W'
bind-key M-n command-prompt -p 'Note (S/g/t):' "run-shell -b 'note --tmux -%%'"
bind-key u   command-prompt -p 'Command:' "run-shell -b 'tmux-popup -t #D -c \"%%\"'"
bind-key C-u run-shell -b 'tmux-popup -t #D -c'
bind-key b   run-shell -b 'tmux-popup -t #D'
bind-key -N smart !   if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { break-pane } { send-keys "C-q" "!" }
bind-key -N smart C-y if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { run-shell "$SCRIPT_PATH/bin/oth/tmux-xclip -t; $SCRIPT_PATH/bin/oth/tmux-xclip -tt" } { send-keys "C-q" "C-y" }
bind-key -N smart C-c if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { run-shell "$SCRIPT_PATH/bin/oth/tmux-xclip -t; $SCRIPT_PATH/bin/oth/tmux-xclip -tt" } { send-keys "C-q" "C-c" }
bind-key -N smart C-v if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { paste-buffer -b clip } { send-keys "C-q" "C-v" }
bind-key -N smart =   if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" 'choose-buffer -O time -NF "#{buffer_sample}"' 'send-keys "C-q" "="'
bind-key          +   choose-buffer -O time -NF '#{buffer_sample}' {
  send-key Escape i F5
  paste-buffer -b '%%'
  send-key F5 Enter Escape
}
bind-key          C-] {
  send-key Escape i F5
  paste-buffer -b 'clip'
  send-key F5 Enter Escape
}
# Swap sessions # {{{
bind-key s   choose-tree -sN
bind-key C-s switch-client -l
bind-key C-e run-shell '~/.tmux.bash switch_client #S'
bind-key e   run-shell '~/.tmux.bash switch_window #S #I'
# }}}
# Make de-attaching a little bit harder # {{{
bind-key D choose-client -F "Detach: #{client_session} [#{client_width}x#{client_height}, #{t/p:client_activity}]"
# }}}
# }}}
# Windows # {{{
bind-key T command-prompt -p 'Title:' "rename-window \"%%\""
# New & Kill # {{{
bind-key -N smart Enter   if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { run-shell "~/.tmux.bash new_window #{pane_id} #{pane_current_path}"      } { send-keys "C-q" "Enter" }
bind-key -N smart c       if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { run-shell "~/.tmux.bash new_window #{pane_id} #{pane_current_path} true" } { send-keys "C-q" "c" }
bind-key          M-Enter run-shell "~/.tmux.bash new_window #{pane_id} #{pane_current_path}"
bind-key          K       choose-window -F 'Kill: #W (#{window_panes})' 'kill-window -t %%'
# }}}
# Splitting # {{{
bind-key -N smart |   if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { split-window -h -l 25% -c '#{pane_current_path}' } { send-keys "C-q" "|"  }
bind-key -N smart -   if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { split-window -v -l 20% -c '#{pane_current_path}' } { send-keys "C-q" "-"  }
bind-key -N smart '\' if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { split-window -h        -c '#{pane_current_path}' } { send-keys "C-q" "\\" }
bind-key -N smart _   if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { split-window -v        -c '#{pane_current_path}' } { send-keys "C-q" "_"  }
# }}}
# Swapping # {{{
bind-key -N smart -r M-H if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { swap-window -d -t -1 } { send-keys "C-q" "M-H" }
bind-key -N smart -r M-L if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { swap-window -d -t +1 } { send-keys "C-q" "M-L" }
bind-key 0 select-window -t :=0
bind-key 1 select-window -t :=1
bind-key 2 select-window -t :=2
bind-key 3 select-window -t :=3
bind-key 4 select-window -t :=4
bind-key 5 select-window -t :=5
bind-key 6 select-window -t :=6
bind-key 7 select-window -t :=7
bind-key 8 select-window -t :=8
bind-key 9 select-window -t :=9
# }}}
# Move between windows # {{{
bind-key -N smart    q   if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { last-window    } { send-keys "C-q" "q" }
bind-key -N smart -r C-n if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { next-window    } { send-keys "C-q" "C-n" }
bind-key -N smart -r C-p if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { previous-window} { send-keys "C-q" "C-p" }
# SMART Global # {{{
bind-key -N smart:np -n -r M-S-Right if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { next-window     } { send-keys "M-S-Right" }
bind-key -N smart:np -n -r M-S-Left  if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { previous-window } { send-keys "M-S-Left" }
# }}}
# }}}
# }}}
# Panes # {{{
# Switching # {{{
# Map Vi movement keys as pane movement keys # {{{
bind-key -N smart -r C-h if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { select-pane -L } { send-keys "C-q" "C-h" }
bind-key -N smart -r C-j if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { select-pane -D } { send-keys "C-q" "C-j" }
bind-key -N smart -r C-k if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { select-pane -U } { send-keys "C-q" "C-k" }
bind-key -N smart -r C-l if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { select-pane -R } { send-keys "C-q" "C-l" }
bind-key -r          M-h select-pane -L
bind-key -r          M-j select-pane -D
bind-key -r          M-k select-pane -U
bind-key -r          M-l select-pane -R
# SMART Global # {{{
bind-key -N smart:np -n -r M-Left  if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { select-pane -L } { send-keys "M-Left"  }
bind-key -N smart:np -n -r M-Down  if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { select-pane -D } { send-keys "M-Down"  }
bind-key -N smart:np -n -r M-Up    if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { select-pane -U } { send-keys "M-Up"    }
bind-key -N smart:np -n -r M-Right if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { select-pane -R } { send-keys "M-Right" }
bind-key -N smart:np -n    M-1     if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { run-shell "~/.tmux.bash preserve_zoom #{window_zoomed_flag} -I switch_pane_1_last " } { send-keys "M-1" }
bind-key -N smart:np -n -r M-p     if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { run-shell "~/.tmux.bash preserve_zoom #{window_zoomed_flag} select-pane -t :.-"     } { send-keys "M-p" }
bind-key -N smart:np -n -r M-n     if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { run-shell "~/.tmux.bash preserve_zoom #{window_zoomed_flag} select-pane -t :.+"     } { send-keys "M-n" }
# }}}
# }}}
bind-key C-i run-shell '~/.tmux.bash select_marked_pane #D'
bind-key m   run-shell '~/.tmux.bash mark_toggle -p #{pane_id}'
bind-key C-w run-shell '~/.tmux.bash mark_toggle -p #{pane_id} -d'
bind-key -N smart    C-Space if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { run-shell "~/.tmux.bash preserve_zoom #{window_zoomed_flag} last-pane" } { send-keys "C-q" "C-Space" }
bind-key -N smart    p       if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { display-panes } { send-keys "C-q" "p" }
bind-key -N smart    a       if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { set-window-option synchronize-panes } { send-keys "C-q" "a" }
bind-key -N smart    M       if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { select-pane -m } { send-keys "C-q" "M" }
bind-key -N smart    P       if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { kill-pane } { send-keys "C-q" "P" }
bind-key -N smart -r o       if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { rotate-window -U } { send-keys "C-q" "o" }
bind-key -N smart -r O       if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { rotate-window -D } { send-keys "C-q" "O" }
# }}}
# Resizing # {{{
bind-key -N smart -r C-Down  if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { resize-pane -D    } { send-keys "C-q" "C-Down"  }
bind-key -N smart -r C-Up    if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { resize-pane -U    } { send-keys "C-q" "C-Up"    }
bind-key -N smart -r C-Left  if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { resize-pane -L    } { send-keys "C-q" "C-Left"  }
bind-key -N smart -r C-Right if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { resize-pane -R    } { send-keys "C-q" "C-Right" }
bind-key -N smart -r M-Down  if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { resize-pane -D 7  } { send-keys "C-q" "M-Down"  }
bind-key -N smart -r M-Up    if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { resize-pane -U 7  } { send-keys "C-q" "M-Up"    }
bind-key -N smart -r M-Left  if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { resize-pane -L 15 } { send-keys "C-q" "M-Left"  }
bind-key -N smart -r M-Right if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { resize-pane -R 15 } { send-keys "C-q" "M-Right" }
# }}}
# Zooming # {{{
bind-key -N smart       Space if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { resize-pane -Z } { send-keys "C-q" "Space" }
bind-key -N smart       z     resize-pane -Z
bind-key -N smart:np -n C-F11 if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { resize-pane -Z } { send-keys "C-F11" }
bind-key -T root DoubleClick1Pane resize-pane -Z
# }}}
# Swapping # {{{
bind-key -N smart '{' if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { swap-pane -U } { send-keys "C-q" "{" }
bind-key -N smart '}' if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { swap-pane -D } { send-keys "C-q" "}" }
bind-key -N smart M-S if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { swap-pane    } { send-keys "C-q" "M-S" }
bind-key          S   command-prompt -p 'Dst-Pane:' "swap-pane -t %%"
bind-key -N smart M-J if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { join-pane } { send-keys "C-q" "M-J" }
# }}}
# }}}
# Copy mode # {{{
bind-key -N smart [     if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { copy-mode    } { send-keys "C-q" "[" }
bind-key -N smart ]     if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { paste-buffer } { send-keys "C-q" "]" }
bind-key -N smart PPage if-shell "[ ! -e $TMUX_NEST/#{pane_id} ]" { copy-mode -u } { send-keys "C-q" "PPage" }
bind-key          M-[   copy-mode
bind-key          M-]   paste-buffer
# copy mode vi # {{{
bind-key -T copy-mode-vi |   send-keys -X start-of-line
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi Y   send-keys -X copy-end-of-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi [   send-keys -X page-up
bind-key -T copy-mode-vi ]   send-keys -X page-down
bind-key -T copy-mode-vi a   send-keys -X append-selection
bind-key -T copy-mode-vi c   send-keys -X copy-selection
bind-key -T copy-mode-vi C   send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi M-Enter send-keys -X pipe-and-cancel "cat - | $SCRIPT_PATH/bin/oth/tmux-xclip --put"
# }}}
# }}}
# ext1-help # {{{
bind-key -T prefix    ? display-message "2nd key(h)..." \; switch-client -T ext1-help
bind-key -T ext1-help ? list-keys -T prefix
bind-key -T ext1-help r list-keys -T root
bind-key -T ext1-help c list-keys -T copy-mode-vi
bind-key -T ext1-help h list-keys -T ext1-help
bind-key -T ext1-help R display-message "Reloading..." \; source-file ~/.tmux.conf
# }}}
# }}}
# Look & Feel a.k.a. Colors & Status Bar # {{{
# Set styles for windows & panes # {{{
set-option -qg renumber-windows on
set-window-option -qg window-active-style      'fg=colour15,bg=colour0'
if-shell '[ ! -z "$TMUX_WINDOW_STYLE" ]' {
  set-window-option -qg window-style             "$TMUX_WINDOW_STYLE"
} {
  set-window-option -qg window-style             "fg=colour242,bg=colour0"
}
set-window-option -qg popup-border-lines       'rounded'
set-window-option -qg pane-active-border-style 'fg=colour214,bg=colour0'
set-window-option -qg pane-border-style        'fg=colour238,bg=colour0'
set-window-option -qg pane-border-status       'top'
set-window-option -qg pane-border-format       ' #{pane_index}:#T '
set-window-option -qg other-pane-height        '15'
set-window-option -qg other-pane-width         '60'
set-hook -g client-resized resize-pane
# }}}
# Use UTF8 # {{{
set-option -qg utf8
set-option -qg status-utf8 on
set-window-option -qg utf8 on
# }}}
# Mouse # {{{
set-option -qg mouse on
set-option -qg mouse-resize-pane on
set-option -qg mouse-select-pane on
set-option -qg mouse-select-window on
# }}}
# Colorize messages in the command line # {{{
set-option -qg message-bg colour235
set-option -qg message-fg colour12
# }}}
# Status Bar # {{{
set-option -qg status on    # turn the status bar on

set -qg status-interval 30  # set update frequencey (default 15 seconds)
set -qg status-justify left # center window list for clarity

# Visual notification of activity in other windows # {{{
set -qg visual-activity on
set -qg visual-silence on
# set -qg visual-content on
# }}}
# Set colors for status bar # {{{
set-option -qg status-bg colour235
set-option -qg status-fg colour15
# }}}
# Set window list colors # {{{
set-window-option -qg window-status-format         " #I:#{=10:window_name}#(~/.tmux.bash window_status_flags '#F') "
set-window-option -qg window-status-current-format " #I:#{=10:window_name}#(~/.tmux.bash window_status_flags '#F') "
set-window-option -qg window-status-style          "fg=colour15"
set-window-option -qg window-status-current-style  "fg=colour214,bright,bg=colour234"
set-window-option -qg window-status-last-style     "fg=colour15,underscore"
# }}}
# Status: left # {{{
set -qg status-left-length 30
run-shell '~/.tmux.bash status_left'
# }}}
# Status: right # {{{
set -qg status-right-length 90
run-shell '~/.tmux.bash status_right'
# }}}
# }}}
# }}}
# Plugin support # {{{
run-shell '~/.tmux.bash plugins'
# }}}

